name: Build ZCore and Send to Telegram

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Licenses and Install SDK Components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;29.0.13846066"

      - name: Rename BlackBox Package
        run: |
          grep -rl "top.niunaijun.blackbox" . | xargs sed -i 's/top.niunaijun.blackbox/zcore/g' || true

      - name: Grant Permission
        run: chmod +x gradlew

      - name: Build AAR
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zcore-aar
          path: "**/*.aar"

      - name: Send AAR to Telegram
        run: |
          FILE=$(find . -name "*.aar" | head -n 1)
          if [ -z "$FILE" ]; then
            echo "No AAR file found!"
            exit 1
          fi
          curl -F document=@"$FILE" \
            -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument"
